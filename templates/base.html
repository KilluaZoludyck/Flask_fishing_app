<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <div class="container">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
        <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
            <div class="col-md-3 mb-2 mb-md-0"><a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
                <img class="header__img" src="{{ url_for('static', filename='img/fish.ico') }}" alt="python">
            </a></div>
            <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
                <li><a href="{{ url_for('main_page') }}" class="nav-link px-2 link-secondary">Главная</a></li>
                <li><a href="{{ url_for('create') }}" class="nav-link px-2">Добавить</a></li>
                <li><a href="{{ url_for('posts') }}" class="nav-link px-2">Статьи</a></li>
                <li><a href="{{ url_for('about_page') }}" class="nav-link px-2 link-secondary">О сайте</a></li>
            </ul>
            <div class="col-md-3 text-end">
                <a href="{{ url_for('logout') }}" class="btn btn-outline-primary btn-logout me-2">Выйти</a>
                <a href="{{ url_for('login') }}" class="btn btn-outline-primary me-2">Войти</a>
                <a href="{{ url_for('register') }}" class="btn btn-primary">Зарегистрироваться</a>
            </div>
        </header>
        {% block content %}{% endblock %}
    </div>

    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
    <div class="col-md-4 d-flex align-items-center"><a href="/"
                                                       class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1"
                                                       aria-label="Bootstrap">
        <img class="header__img" width="30" height="24" src="{{ url_for('static', filename='img/fish.ico') }}" alt="python">
    </a> <span class="mb-3 mb-md-0 text-body-secondary">© 2026 Killua work </span></div>
    <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
        <li class="ms-3"><a class="text-body-secondary" href="https://t.me/Goon_fricks" aria-label="Telegram">
            <svg class="bi" width="24" height="24" aria-hidden="true">
                <img class="header__img" src="{{ url_for('static', filename='img/tg.ico') }}" alt="python">
                <use xlink:href="#instagram"></use>
            </svg>
        </a></li>
    </ul>
    </footer>

</body>
</html>
