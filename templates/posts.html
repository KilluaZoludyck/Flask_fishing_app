{% extends 'base.html' %}

{% block title %}
Все статьи
{% endblock %}

{% block content %}
<h1>Все статьи</h1>

<div class="row">
    {% for post in posts %}
        <div class="col-md-6 mb-4">
            <div class="row g-0 border rounded overflow-hidden flex-md-row shadow-sm h-md-250 position-relative">
                <div class="col p-4 d-flex flex-column position-static">
                    <h6 class="mb-1 text-body-secondary">
                        {{ post.author.username }} | {{ post.date.strftime('%d.%m.%Y %H:%M') }}
                    </h6>
                    <h3 class="mb-0">{{ post.title }}</h3>
                    <div class="mb-1 text-body-secondary">------------</div>
                    <h5 class="mb-auto post-preview">{{ post.content }}</h5>

                    <a href="{{ url_for('one_post_page', post_id=post.id) }}"
                       class="icon-link gap-1 icon-link-hover stretched-link">
                        Продолжить читать..
                        <svg class="bi" aria-hidden="true">
                            <use xlink:href="#chevron-right"></use>
                        </svg>
                    </a>
                </div>

                <div class="col-auto d-none d-lg-block">
                    <svg aria-label="img-holder" class="bd-placeholder-img" height="300"
                         preserveAspectRatio="xMidYMid slice" role="img" width="10"
                         xmlns="http://www.w3.org/2000/svg">
                        <rect width="100%" height="100%" fill="#e9f3ff"></rect>
                    </svg>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
