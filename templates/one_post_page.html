{% extends "base.html" %}

{% block title %}
{{ post.title }}
{% endblock %}

{% block content %}
    <h2>{{ post.title }}</h2>
    <p class="text-muted">
        Автор: {{ post.author.username }} | {{ post.date.strftime('%d.%m.%Y %H:%M') }}
    </p>
    <p class="post-body">{{ post.content }}</p>
    <a href="{{ url_for('posts') }}">Вернуться к постам ↓</a>
{% endblock %}
